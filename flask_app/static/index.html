<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Disease Predictor</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Select2 core -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
  <!-- Select2 Bootstrap 5 theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="container py-4">
      <div class="d-flex align-items-center gap-3">
        <div class="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8z"/>
            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
          </svg>
        </div>
        <div>
          <h1 class="h4 mb-0 fw-bold text-white">Multi-Disease Predictor</h1>
          <p class="mb-0 text-white-50 small">ML-powered symptom analysis &mdash; 377 symptoms · 4 models</p>
        </div>
        <a href="/docs" target="_blank" class="btn btn-outline-light btn-sm ms-auto">API Docs</a>
      </div>
    </div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────────────────────── -->
  <main class="container py-4">
    <div class="row g-4 align-items-start">

      <!-- ── Input panel ─────────────────────────────────────────────────── -->
      <div class="col-lg-5">
        <div class="card app-card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0 fw-semibold">Select Symptoms</h5>
            <p class="text-muted small mb-0" id="symptom-hint">Loading symptoms&hellip;</p>
          </div>
          <div class="card-body">
            <form id="predict-form" novalidate>

              <!-- Symptom multi-select -->
              <div class="mb-4">
                <label class="form-label fw-medium" for="symptom-select">
                  Symptoms <span class="text-danger">*</span>
                </label>
                <select id="symptom-select" class="form-select" multiple="multiple" style="width:100%"></select>
              </div>

              <!-- Model + Top-N row -->
              <div class="row g-2 mb-4">
                <div class="col-7">
                  <label class="form-label fw-medium" for="model-select">Model</label>
                  <select id="model-select" class="form-select form-select-sm">
                    <option value="best_model">Best Model (auto)</option>
                    <option value="logistic_regression">Logistic Regression</option>
                    <option value="random_forest">Random Forest</option>
                    <option value="decision_tree">Decision Tree</option>
                    <option value="lightgbm">LightGBM</option>
                  </select>
                </div>
                <div class="col-5">
                  <label class="form-label fw-medium" for="top-n">Top N</label>
                  <input type="number" id="top-n" class="form-control form-control-sm"
                         value="5" min="1" max="20" />
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 predict-btn" id="predict-btn" disabled>
                <span id="btn-text">Predict Disease</span>
                <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- ── Results panel ───────────────────────────────────────────────── -->
      <div class="col-lg-7">
        <div class="card app-card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0 fw-semibold">Prediction Results</h5>
          </div>

          <!-- Placeholder -->
          <div class="card-body" id="results-placeholder">
            <div class="empty-state text-center text-muted py-5">
              <div class="empty-icon mb-3">&#x1F52C;</div>
              <p class="mb-0">Select symptoms and click <strong>Predict Disease</strong> to see results here.</p>
            </div>
          </div>

          <!-- Error state -->
          <div class="card-body d-none" id="results-error">
            <div class="alert alert-danger mb-0" id="error-msg" role="alert"></div>
          </div>

          <!-- Results content -->
          <div class="card-body d-none" id="results-content"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- ── Footer ────────────────────────────────────────────────────────────── -->
  <footer class="text-center text-muted small py-4">
    Powered by FastAPI &amp; scikit-learn &mdash; for research purposes only
  </footer>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
